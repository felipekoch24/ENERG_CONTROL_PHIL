<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Energy Tracker ⚡</title>
    <style>
        body { background-color: #0a0a0a; color: #fff; font-family: 'Segoe UI', sans-serif; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { background: #111; width: 100%; max-width: 420px; padding: 25px; border-radius: 20px; border: 1px solid #2ecc71; box-shadow: 0 0 15px rgba(46, 204, 113, 0.2); }
        h1 { color: #2ecc71; text-align: center; font-size: 24px; letter-spacing: 1px; margin-bottom: 25px; }
        
        .status-box { background: #1a1a1a; padding: 15px; border-radius: 12px; margin-bottom: 15px; border-left: 5px solid #2ecc71; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .stats { font-size: 10px; color: #888; text-transform: uppercase; }
        .stats b { color: #fff; font-size: 12px; display: block; margin-top: 2px; line-height: 1.2; }
        
        .placar-marcas { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 15px; justify-content: center; }
        .pill-marca { background: #0d0d0d; border: 1px solid #333; padding: 4px 10px; border-radius: 12px; font-size: 10px; color: #aaa; }
        .pill-marca b { color: #2ecc71; margin-left: 3px; }

        .prog-bg { grid-column: span 2; background: #333; height: 8px; border-radius: 4px; overflow: hidden; margin-top: 5px; }
        .prog-fill { background: #2ecc71; height: 100%; width: 0%; transition: 0.5s; }

        #alerta { display: none; background: #441111; color: #ff5555; padding: 15px; border-radius: 10px; margin-bottom: 20px; font-size: 12px; font-weight: bold; text-align: center; border: 1px solid #ff0000; }
        
        .input-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        .row { display: flex; gap: 8px; }
        select, input { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #333; background: #1a1a1a; color: #fff; font-size: 14px; outline: none; }
        input:focus { border-color: #2ecc71; }
        
        .btn-add { background: #2ecc71; color: #000; border: none; padding: 14px; border-radius: 10px; font-weight: bold; font-size: 15px; cursor: pointer; }

        .historico { height: 200px; overflow-y: auto; background: #0d0d0d; padding: 12px; border-radius: 10px; border: 1px solid #222; margin-top: 15px; }
        .hist-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 5px; border-bottom: 1px solid #1a1a1a; }
        .item-txt strong { color: #2ecc71; font-size: 14px; display: block; }
        .item-txt span { font-size: 12px; color: #ccc; }
        .item-txt small { color: #555; font-size: 10px; display: block; margin-top: 2px; }
        
        .btn-obs { display: flex; gap: 8px; }
        .icon-btn { background: none; border: none; cursor: pointer; font-size: 16px; color: #444; padding: 5px; }
        .edit-btn:hover { color: #2ecc71; }
        .del-btn:hover { color: #ff5555; }
    </style>
</head>
<body>

<div class="card">
    <h1>🔋 STATUS ENERGIA</h1>
    
    <div id="alerta">🚨 VAI COM CALMA CAMPEÃO, ESPERE PELO PRÓX. MÊS! EXCEDEU SEU LIMITE!</div>

    <div class="status-box">
        <div class="stats">MÊS +TOMADO:<br><b id="favMes">---</b></div>
        <div class="stats">ANO +TOMADO:<br><b id="favAno">---</b></div>
        <div class="stats">TOTAL MÊS:<br><b id="totalMes">0 UNID.</b></div>
        <div class="stats">TOTAL ANO:<br><b id="totalAno">0 UNID.</b></div>
        <div class="stats" style="grid-column: span 2;">GASTO MENSAL: <b id="gastoMes" style="color:#2ecc71; display:inline">R$ 0,00</b></div>
        <div class="prog-bg"><div id="progBar" class="prog-fill"></div></div>
    </div>

    <div class="placar-marcas" id="placarMarcas"></div>

    <div class="input-group">
        <div class="row">
            <select id="marca">
                <option value="MONSTER">MONSTER</option>
                <option value="REDBULL">RED BULL</option>
                <option value="BALY">BALY</option>
                <option value="ELEV FRUKI">ELEV</option>
                <option value="OUTRO">OUTRO</option>
            </select>
            <input type="text" id="preco" placeholder="R$ 0,00" oninput="moneyMask(this)">
        </div>
        <input type="text" id="sabor" placeholder="Sabor ou cor (Ex: Ultra Paradise)">
        <button class="btn-add" id="btnSalvar" onclick="salvar()">REGISTRAR AGORA ⚡</button>
    </div>

    <div class="historico" id="lista"></div>
</div>

<script>
    let editId = null;
    const LIMITE_PADRAO = 5; 

    function moneyMask(i) {
        let v = i.value.replace(/\D/g,'');
        v = (v/100).toFixed(2) + '';
        v = v.replace(".", ",");
        i.value = "R$ " + v;
    }

    function getMes() { return (new Date().getMonth() + 1) + "-" + new Date().getFullYear(); }

    function salvar() {
        const marca = document.getElementById('marca').value;
        const saborInput = document.getElementById('sabor').value.trim();
        const sabor = saborInput || "TRADICIONAL";
        const precoStr = document.getElementById('preco').value.replace("R$ ", "").replace(",", ".");
        const preco = parseFloat(precoStr) || 0;
        
        let db = JSON.parse(localStorage.getItem('energyDB') || "{}");
        let mes = getMes();
        if (!db[mes]) db[mes] = [];

        if (editId) {
            let idx = db[mes].findIndex(x => x.id === editId);
            db[mes][idx] = { ...db[mes][idx], marca, sabor, preco };
            editId = null;
            document.getElementById('btnSalvar').innerText = "REGISTRAR AGORA ⚡";
        } else {
            db[mes].push({ id: Date.now(), marca, sabor, preco, data: new Date().toLocaleDateString('pt-br') });
        }

        localStorage.setItem('energyDB', JSON.stringify(db));
        document.getElementById('sabor').value = "";
        document.getElementById('preco').value = "";
        renderizar();
    }

    function prepararEdicao(id) {
        let db = JSON.parse(localStorage.getItem('energyDB'))[getMes()];
        let item = db.find(x => x.id === id);
        document.getElementById('marca').value = item.marca;
        document.getElementById('sabor').value = item.sabor;
        document.getElementById('preco').value = "R$ " + item.preco.toFixed(2).replace('.', ',');
        editId = id;
        document.getElementById('btnSalvar').innerText = "ATUALIZAR ITEM ✎";
    }

    function excluir(id) {
        if (!confirm("Remover esse registro?")) return;
        let db = JSON.parse(localStorage.getItem('energyDB'));
        db[getMes()] = db[getMes()].filter(x => x.id !== id);
        localStorage.setItem('energyDB', JSON.stringify(db));
        renderizar();
    }

    function renderizar() {
        const db = JSON.parse(localStorage.getItem('energyDB') || "{}");
        const mesKey = getMes();
        const listaMes = db[mesKey] || [];

        let totalAno = 0, gastoMes = 0;
        let countMarcasMes = { "MONSTER": 0, "REDBULL": 0, "BALY": 0, "ELEV FRUKI": 0, "OUTRO": 0 };
        let fullCountMes = {}, fullCountAno = {};

        Object.keys(db).forEach(m => {
            db[m].forEach(i => {
                totalAno++;
                const nomeCompleto = `${i.marca} ${i.sabor}`;
                fullCountAno[nomeCompleto] = (fullCountAno[nomeCompleto] || 0) + 1;
                
                if (m === mesKey) {
                    gastoMes += i.preco;
                    fullCountMes[nomeCompleto] = (fullCountMes[nomeCompleto] || 0) + 1;
                    if(countMarcasMes[i.marca] !== undefined) countMarcasMes[i.marca]++;
                    else countMarcasMes["OUTRO"]++;
                }
            });
        });

        const placar = document.getElementById('placarMarcas');
        placar.innerHTML = Object.entries(countMarcasMes).map(([m, qtd]) => 
            `<div class="pill-marca">${m}:<b>${qtd}</b></div>`
        ).join('');

        const favM = Object.keys(fullCountMes).reduce((a, b) => fullCountMes[a] > fullCountMes[b] ? a : b, "---");
        const favA = Object.keys(fullCountAno).reduce((a, b) => fullCountAno[a] > fullCountAno[b] ? a : b, "---");

        document.getElementById('favMes').innerText = fullCountMes[favM] > 0 ? favM : "---";
        document.getElementById('favAno').innerText = favA;
        document.getElementById('totalMes').innerText = listaMes.length + " UNID.";
        document.getElementById('totalAno').innerText = totalAno + " UNID.";
        document.getElementById('gastoMes').innerText = "R$ " + gastoMes.toFixed(2).replace('.', ',');

        const perc = Math.min((listaMes.length / LIMITE_PADRAO) * 100, 100);
        document.getElementById('progBar').style.width = perc + "%";
        document.getElementById('progBar').style.backgroundColor = listaMes.length >= LIMITE_PADRAO ? "#ff4444" : "#2ecc71";
        document.getElementById('alerta').style.display = listaMes.length >= LIMITE_PADRAO ? 'block' : 'none';

        document.getElementById('lista').innerHTML = listaMes.slice().reverse().map(i => `
            <div class="hist-item">
                <div class="item-txt">
                    <strong>${i.marca}</strong>
                    <span>${i.sabor} | R$ ${i.preco.toFixed(2).replace('.', ',')}</span>
                    <small>${i.data}</small>
                </div>
                <div class="btn-obs">
                    <button class="icon-btn edit-btn" onclick="prepararEdicao(${i.id})">✎</button>
                    <button class="icon-btn del-btn" onclick="excluir(${i.id})">✕</button>
                </div>
            </div>
        `).join('');
    }

    renderizar();
</script>
</body>
</html>

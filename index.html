<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Energy Tracker ⚡</title>
    <style>
        body { background-color: #0a0a0a; color: #fff; font-family: 'Segoe UI', sans-serif; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { background: #111; width: 100%; max-width: 420px; padding: 25px; border-radius: 20px; border: 1px solid #2ecc71; box-shadow: 0 0 15px rgba(46, 204, 113, 0.2); }
        h1 { color: #2ecc71; text-align: center; font-size: 24px; letter-spacing: 1px; margin-bottom: 25px; }
        
        .status-box { background: #1a1a1a; padding: 15px; border-radius: 12px; margin-bottom: 20px; border-left: 5px solid #2ecc71; }
        .stats { font-size: 13px; color: #888; margin-bottom: 8px; text-transform: uppercase; }
        .stats b { color: #fff; font-size: 15px; display: block; margin-top: 2px; }
        
        #alerta { display: none; background: #441111; color: #ff5555; padding: 15px; border-radius: 10px; margin-bottom: 20px; font-size: 13px; font-weight: bold; text-align: center; border: 1px solid #ff0000; line-height: 1.4; }
        
        .input-group { display: flex; gap: 8px; margin-bottom: 20px; }
        input { flex: 1; padding: 14px; border-radius: 10px; border: 1px solid #333; background: #1a1a1a; color: #fff; font-size: 15px; }
        input:focus { border-color: #2ecc71; outline: none; }
        .btn-add { background: #2ecc71; color: #000; border: none; padding: 0 20px; border-radius: 10px; font-weight: bold; font-size: 20px; transition: 0.3s; }

        .limite-aba { background: #161616; padding: 15px; border-radius: 12px; margin-top: 10px; }
        .btn-limite { width: 100%; background: #222; color: #aaa; border: 1px solid #333; padding: 10px; border-radius: 8px; margin-top: 8px; font-size: 12px; }

        .historico { height: 220px; overflow-y: auto; background: #0d0d0d; padding: 12px; border-radius: 10px; font-size: 14px; border: 1px solid #222; margin-top: 15px; }
        .hist-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 5px; border-bottom: 1px solid #1a1a1a; color: #eee; }
        .hist-info { display: flex; flex-direction: column; }
        .hist-info small { color: #555; font-size: 11px; }
        .btn-del-item { background: none; border: none; color: #ff4444; font-weight: bold; cursor: pointer; padding: 5px 10px; font-size: 16px; }
    </style>
</head>
<body>

<div class="card">
    <h1>🔋 STATUS ENERGIA</h1>
    
    <div id="alerta">
        🚨 CUIDADO: ENERGÉTICO EM EXCESSO PODE PREJUDICAR SEU CORAÇÃO A LONGO PRAZO. SE CUIDE 🤝🏻
    </div>

    <div class="status-box">
        <div class="stats">O MAIS TOMADO (CAMPEÃO):<br><b id="maisTomado" style="color:#2ecc71">---</b></div>
        <div class="stats">TOTAL DO MÊS: <b id="totalMes">0 UNIDADES</b></div>
    </div>

    <div class="input-group">
        <input type="text" id="nomeEnergetico" placeholder="Qual você tomou agora?">
        <button class="btn-add" onclick="adicionar()">+</button>
    </div>

    <div class="limite-aba">
        <div class="stats" style="margin:0">META DE LIMITE: <span id="valLimite" style="color:#fff">Não definido</span></div>
        <input type="number" id="inputLimite" placeholder="Ex: 5" style="width: 80%; padding: 8px; margin-top: 10px; font-size: 13px;">
        <button class="btn-limite" onclick="setLimite()">DEFINIR LIMITE MENSAL</button>
    </div>

    <div class="historico" id="lista"></div>
    <div style="text-align: center; margin-top: 15px; font-size: 11px; color: #444;">Histórico automático | Clique no X para apagar erro.</div>
</div>

<script>
    function checarResetMensal() {
        const data = new Date();
        const mesChave = data.getMonth() + "-" + data.getFullYear();
        if (localStorage.getItem('mesAtivoEn') !== mesChave) {
            localStorage.setItem('histEnergia', JSON.stringify([]));
            localStorage.setItem('mesAtivoEn', mesChave);
        }
    }

    function adicionar() {
        const campo = document.getElementById('nomeEnergetico');
        const nome = campo.value.trim();
        if (!nome) return;

        const hist = JSON.parse(localStorage.getItem('histEnergia') || "[]");
        // Salva com um ID único baseado no tempo para poder apagar o certo
        hist.push({ id: Date.now(), nome: nome, data: new Date().toLocaleDateString('pt-br') });
        
        localStorage.setItem('histEnergia', JSON.stringify(hist));
        campo.value = "";
        renderizar();
    }

    function apagarItem(id) {
        let hist = JSON.parse(localStorage.getItem('histEnergia') || "[]");
        hist = hist.filter(item => item.id !== id);
        localStorage.setItem('histEnergia', JSON.stringify(hist));
        renderizar();
    }

    function setLimite() {
        const lim = document.getElementById('inputLimite').value;
        localStorage.setItem('limiteMaxEn', lim);
        document.getElementById('inputLimite').value = "";
        renderizar();
    }

    function renderizar() {
        const hist = JSON.parse(localStorage.getItem('histEnergia') || "[]");
        const limite = localStorage.getItem('limiteMaxEn');
        
        document.getElementById('totalMes').innerText = hist.length + " UNIDADES";
        document.getElementById('alerta').style.display = hist.length >= 10 ? 'block' : 'none';

        // Lógica do Campeão
        const contagem = {};
        hist.forEach(i => {
            const n = i.nome.toUpperCase();
            contagem[n] = (contagem[n] || 0) + 1;
        });

        let topNome = "---";
        let topQtd = 0;
        for (const [nome, qtd] of Object.entries(contagem)) {
            if (qtd > topQtd) {
                topQtd = qtd;
                topNome = nome;
            }
        }
        document.getElementById('maisTomado').innerText = topQtd > 0 ? `${topNome} (${topQtd}x)` : "---";

        // Limite
        const displayLim = document.getElementById('valLimite');
        if(limite) {
            displayLim.innerText = limite;
            displayLim.style.color = hist.length >= limite ? "#ff4444" : "#2ecc71";
        }

        // Lista com botão de apagar
        document.getElementById('lista').innerHTML = hist.slice().reverse().map(i => `
            <div class="hist-item">
                <div class="hist-info">
                    <span>${i.nome}</span>
                    <small>${i.data}</small>
                </div>
                <button class="btn-del-item" onclick="apagarItem(${i.id})">×</button>
            </div>
        `).join('');
    }

    checarResetMensal();
    renderizar();
</script>

</body>
</html>
